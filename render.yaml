services:
  - type: web
    name: ai-batting-classifier-api
    runtime: python
    rootDir: backend
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: WEB_CONCURRENCY
        value: 1
      - key: OMP_NUM_THREADS
        value: 1
      - key: TF_NUM_INTRAOP_THREADS
        value: 1
      - key: TF_NUM_INTEROP_THREADS
        value: 1
      - key: CORS_ALLOWED_ORIGINS
        sync: false
    buildCommand: pip install --upgrade pip setuptools wheel && pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 1 --timeout 300 --worker-class uvicorn.workers.UvicornWorker
    healthCheckPath: /health
