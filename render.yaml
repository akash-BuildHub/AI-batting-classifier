services:
  - type: web
    name: ai-batting-classifier-api
    runtime: python
    rootDir: backend
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: WEB_CONCURRENCY
        value: 1
      - key: OMP_NUM_THREADS
        value: 1
      - key: TF_NUM_INTRAOP_THREADS
        value: 1
      - key: TF_NUM_INTEROP_THREADS
        value: 1
    buildCommand: pip install --upgrade pip setuptools wheel && pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 1 --timeout 300
    healthCheckPath: /health

  - type: web
    name: ai-batting-classifier-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: ai-batting-classifier-api
          envVarKey: RENDER_EXTERNAL_URL
